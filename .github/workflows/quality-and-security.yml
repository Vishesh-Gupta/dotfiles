name: Quality and Security Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install scan dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck ripgrep

      - name: Run test suite
        run: bash ./scripts/test.sh

      - name: Run security scan
        run: bash ./scripts/security-scan.sh
